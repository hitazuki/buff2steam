# ============================================================
# buff2steam 配置文件模板
# 复制此文件为 config.yaml 并填入真实 Cookie
# config.yaml 已被 .gitignore，不会被提交
# ============================================================

buff:
  # 从浏览器 DevTools → Application → Cookies → buff.163.com 获取
  cookie: "session=YOUR_BUFF_SESSION_COOKIE_HERE"
  games:
    - csgo    # CS2
    - dota2   # DOTA2
  page_size: 20          # BUFF 每页条数，最大 20
  max_pages: 100         # 最多拉取页数（20*100=2000条）

c5:
  # 第一版仅支持手动配置网页登录 Cookie；不会使用 app-key 或执行写操作
  # 抓取游戏沿用上方 buff.games 列表
  enabled: false
  cookie: "YOUR_C5_COOKIE_HERE"
  page_size: 60
  max_pages: 100

steam:
  # 从浏览器 DevTools → Application → Cookies → steamcommunity.com 获取
  session_id: "YOUR_STEAM_SESSIONID"
  steam_login_secure: "YOUR_STEAM_LOGIN_SECURE"
  # 可选显式填写；启用 C5 且无法从 steam_login_secure 提取时必须配置
  steam_id: ""
  # Steam 钱包货币代码（1=USD, 2=GBP, 3=EUR, 5=RUB, 23=CNY, 24=CAD, 34=HKD 等）
  # 脚本会自动从交易记录中检测，此处作为备用
  default_currency: 23
  # 每次请求获取的历史条数（最大 500）
  fetch_count: 500

currency:
  # 目标货币，统一换算为 CNY
  target: "CNY"
  # 汇率 API（免费，无需注册）
  # 备用：若 API 请求失败，使用以下硬编码汇率
  fallback_rates:
    USD: 7.24
    GBP: 9.15
    EUR: 7.85
    RUB: 0.079
    HKD: 0.93
    CAD: 5.28
    JPY: 0.047
    KRW: 0.0052
    BRL: 1.30
    CNY: 1.0

# 长期行情监控（第一版：裂空武器箱，BUFF → Steam）
monitoring:
  interval_seconds: 300
  history_days: 30
  database: "./data/monitor.db"
  health_failure_threshold: 3
  item:
    item_key: "csgo:fracture_case"
    appid: 730
    smis_id: 1579
    name: "Fracture Case"
    name_zh: "裂空武器箱"
    platform: "buff"
  source:
    timeout_seconds: 15
    max_retries: 3
    # auth_key/auth2 默认跟随当前 SMIS 前端实现；站点变更时可在此覆盖。
  strategy:
    max_ratio: 0.72
    max_age_minutes: 15
    min_buff_sell_num: 100
    min_steam_volume: 1000
    confirmations: 2
    clear_confirmations: 2

notifications:
  pushplus:
    enabled: true
    token_env: "PUSHPLUS_TOKEN"
    timeout_seconds: 10
    max_retries: 2

settings:
  match_strategy: "fifo"     # 匹配策略：fifo（先进先出）
  cache_ttl_hours: 6         # 本地缓存有效时间（小时）
  output_dir: "./output"
  data_dir: "./data"
  # 统计时间范围（留空表示全部历史）
  date_from: ""              # 格式：2024-01-01
  date_to: ""                # 格式：2025-12-31
